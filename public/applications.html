<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker - Applications</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>

  <nav>
    <h1>Job Tracker</h1>
    <div class="nav-links">
      <a href="/pages/index.html">Dashboard</a>
      <a href="/pages/applications.html" class="active">Applications</a>
    </div>
  </nav>

  <main>

    <!-- Add Application Form -->
    <section class="form-section">
      <h2>Add Application</h2>
      <form id="application-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="company">Company</label>
            <input type="text" id="company" placeholder="e.g. Google" required />
          </div>
          <div class="form-group">
            <label for="role">Role</label>
            <input type="text" id="role" placeholder="e.g. Software Engineer Intern" required />
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status">
              <option value="APPLIED">Applied</option>
              <option value="INTERVIEW">Interview</option>
              <option value="OFFER">Offer</option>
              <option value="REJECTED">Rejected</option>
              <option value="WITHDRAWN">Withdrawn</option>
            </select>
          </div>
          <div class="form-group">
            <label for="applied_date">Date Applied</label>
            <input type="date" id="applied_date" required />
          </div>
          <div class="form-group">
            <label for="deadline">Deadline</label>
            <input type="date" id="deadline" />
          </div>
          <div class="form-group">
            <label for="job_url">Job URL</label>
            <input type="url" id="job_url" placeholder="https://..." />
          </div>
          <div class="form-group full-width">
            <label for="notes">Notes</label>
            <textarea id="notes" placeholder="Any details, contacts, next steps..."></textarea>
          </div>
        </div>
        <button type="submit" class="btn-primary">Add Application</button>
      </form>
    </section>

    <!-- Applications Table -->
    <section class="applications-section">
      <h2>My Applications</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Company</th>
              <th>Role</th>
              <th>Status</th>
              <th>Date Applied</th>
            </tr>
          </thead>
          <tbody id="applications-container">
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-card">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-header">
        <h3 id="modal-company"></h3>
        <p class="modal-role" id="modal-role"></p>
      </div>
      <div class="modal-meta">
        <div class="modal-meta-item">
          <label>Status</label>
          <span id="modal-status-badge"></span>
        </div>
        <div class="modal-meta-item">
          <label>Date Applied</label>
          <span id="modal-date"></span>
        </div>
        <div class="modal-meta-item">
          <label>Deadline</label>
          <span id="modal-deadline"></span>
        </div>
        <div class="modal-meta-item">
          <label>Job Posting</label>
          <span id="modal-url"></span>
        </div>
      </div>
      <div class="modal-notes" id="modal-notes-wrapper">
        <span id="modal-notes"></span>
      </div>
      <div class="modal-actions">
        <div style="display:flex; align-items:center; gap:0.75rem;">
          <select class="modal-status-select" id="modal-status-select">
            <option value="APPLIED">Applied</option>
            <option value="INTERVIEW">Interview</option>
            <option value="OFFER">Offer</option>
            <option value="REJECTED">Rejected</option>
            <option value="WITHDRAWN">Withdrawn</option>
          </select>
          <button class="btn-primary" id="modal-update-btn" style="margin-top:0; padding: 0.5rem 1.25rem;">Update</button>
        </div>
        <button class="btn-danger" id="modal-delete-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="/scripts/api.js"></script>
  <script src="/scripts/app.js"></script>
</body>
</html>
